services:
  whisper-stt:
    devices:
      - "nvidia.com/gpu=0"
    security_opt:
      - "label=disable"
    environment:
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

  qwen-tts:
    devices:
      - "nvidia.com/gpu=0"
    security_opt:
      - "label=disable"
    environment:
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

  qwen-vllm:
    devices:
      - "nvidia.com/gpu=all"
    security_opt:
      - "label=disable"
    ipc: host
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
